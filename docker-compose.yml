services:
  mysql:
    image: mysql:8
    container_name: mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mysqladmin ping -h 127.0.0.1 -u root -p"$$MYSQL_ROOT_PASSWORD" --silent',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    env_file: .env

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api-migrate:
    build:
      context: backend
      dockerfile: Dockerfile
    container_name: api-migrate
    restart: "no"
    command: ["npx", "prisma", "db", "push"]
    depends_on:
      mysql:
        condition: service_healthy
    env_file: .env

  api-seed:
    build:
      context: backend
      dockerfile: Dockerfile
    container_name: api-seed
    restart: "no"
    profiles: ["tools"]
    command: ["npx", "prisma", "db", "seed"]
    depends_on:
      mysql:
        condition: service_healthy
      api-migrate:
        condition: service_completed_successfully
    env_file: .env

  api:
    build:
      context: backend
      dockerfile: Dockerfile
    container_name: api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      api-migrate:
        condition: service_completed_successfully
    env_file: .env
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
    ports:
      - "3000:3000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/public:/app/public
      - ./backend/prisma:/app/prisma
      - /app/node_modules
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/healthz', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  web:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
    ports:
      - "8080:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:5173', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    env_file: .env

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  mysql-data:
  redis-data:
  caddy-data:
  caddy-config:
